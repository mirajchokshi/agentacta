<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentActa — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface-hover: #1a2235;
      --border: #1e2d45;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --error-bg: #1f0a0a;
      --error-border: #7f1d1d;
      --error-text: #fca5a5;
      --radius: 10px;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 7px;
      color: var(--error-text);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .error-banner.visible { display: block; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 40px 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--text-muted); }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .toggle-btn:hover { color: var(--text); }

    .toggle-btn svg { width: 16px; height: 16px; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:active { transform: scale(0.99); }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .hint code {
      font-family: var(--mono);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img class="logo-icon" src="/icon.svg" alt="AgentActa" />
      <span class="logo-text">AgentActa</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your auth token to access your session data.</p>

    <div class="error-banner" id="errorBanner">
      Incorrect token — please try again.
    </div>

    <form method="POST" action="/api/auth/login" id="loginForm">
      <input type="hidden" name="next" id="nextInput" value="/" />
      <label for="tokenInput">Auth Token</label>
      <div class="input-wrap">
        <input
          type="password"
          id="tokenInput"
          name="token"
          placeholder="Paste your token here"
          autocomplete="current-password"
          autofocus
          required
        />
        <button type="button" class="toggle-btn" id="toggleBtn" aria-label="Toggle visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="submit-btn">Sign in</button>
    </form>

    <p class="hint">
      Token is in your terminal output.<br />
      To disable auth: <code>AGENTACTA_AUTH=off</code>
    </p>
  </div>

  <script>
    // Show error banner if ?error=1
    const params = new URLSearchParams(location.search);
    if (params.get('error') === '1') {
      document.getElementById('errorBanner').classList.add('visible');
    }

    // Propagate ?next= to hidden form field
    const next = params.get('next');
    if (next) document.getElementById('nextInput').value = next;

    // Password visibility toggle
    const input = document.getElementById('tokenInput');
    const btn = document.getElementById('toggleBtn');
    const icon = document.getElementById('eyeIcon');

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeOff = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    btn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.innerHTML = isPassword ? eyeOff : eyeOpen;
    });
  </script>
</body>
</html>
